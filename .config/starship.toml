# nGet editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$nix_shell\
$username\
$hostname\
$directory\
$fill\
$kubernetes\
$rust\
$lua\
$nodejs\
$golang\
$python\
$git_branch\
$git_status\
$aws\
${custom.aws-sso}\
$azure\
$terraform\
$docker_context\
$vagrant\
$time\
$line_break\
$character"""


# Inserts a blank line between shell prompts
add_newline = true
command_timeout = 10000 # 10 seconds

# Replace the '❯' symbol in the prompt with '➜'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[❯](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'
error_symbol = '[✗](bold red)'

[directory]
style = 'blue'
read_only = ' 󰌾'
read_only_style = 'blue'
truncation_length = 7
truncate_to_repo = true
home_symbol = '~'

[nodejs]
format = '[\[ $symbol ($version) \] ]($style)'
symbol = ' '

[golang]
format = '[\[ $symbol($version) \] ]($style)'
symbol = ' '

[python]
format = '[\[ $symbol($version):($virtualenv) \] ]($style)'
symbol = ' '
style = 'blue'

[rust]
format = '[\[ $symbol($version) \] ]($style)'
symbol = ' '
style = 'bold fg:#fab387'

[lua]
format = '[\[ $symbol($version) \] ]($style)'
symbol = " "

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
format = '[\[ $symbol$branch(:$remote_branch) \] ]($style)'
style = 'bold fg:#f5c2e7'
symbol = " "

[git_status]
format = '([\[ $all_status$ahead_behind \] ]($style))'
# style = 'bold purple'
style = 'bold fg:#f5c2e7'
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'

[aws]
disabled = false
format = '[ \[ $symbol $profile / $region / $duration \]]($style)'
symbol = "󰸏 "
style = 'bold fg:#fab387'

[azure]
disabled = false
format = '[ \[ $symbol ($subscription) \]]($style)'
symbol = '󰠅 '
style = 'bold fg:#89b4fa'

[terraform]
format = '[ \[ $symbol $workspace \] ]($style)'
symbol = '󱁢 '
style = 'bold fg:#cba6f7'

[docker_context]
format = '[ \[ $symbol $context \] ]($style)'
symbol = '󰡨 '
style = 'bold fg:#74c7ec'
# format = 'via [🐋 $context](blue bold)'

[time]
disabled = false
format = '[\[   $time \]]($style)'
time_format = '%Y-%m-%d %H:%M:%S'
time_range = '10:00:00-14:00:00'
style = 'bold peach'

# ~/.config/starship.toml

[nix_shell]
disabled = false
impure_msg = '[default shell](bold green)'
pure_msg = '[pure shell](bold yellow)'
unknown_msg = '[unknown shell](bold red)'
format = 'via [󱄅 $state( \($name\)):](bold blue) '

# ~/.config/starship.toml

[vagrant]
format = '[\[   $version \]](bold white) '

[kubernetes]
format = '[\[ 󱃾 $context \( $user - 󰦉 $cluster -  $namespace\) \]]($style) '
disabled = false
style = 'bold #74c7ec'


[custom.aws-sso]
command = '''
for cache_file in ~/.aws/sso/cache/*.json; do
    start_url=$(cat "$cache_file" | jq -r '.startUrl // empty' 2>/dev/null)
    if [ -n "$start_url" ]; then
        profile=$(cat ~/.aws/config | grep -B5 "$start_url" | grep -E '^\[(sso-session|profile) ' | awk '{print $2}' | tr -d ']' | head -1)
        if [ -n "$profile" ]; then
            echo "$profile"
            break
        fi
    fi
done
'''
when = '''
for cache_file in ~/.aws/sso/cache/*.json; do
    if grep -q "startUrl" "$cache_file" 2>/dev/null; then
        exit 0
    fi
done
exit 1
'''
style = 'bold fg:#fab387'
format = '[\[ $symbol $output \] ]($style)'
symbol = "  󰸏 "

