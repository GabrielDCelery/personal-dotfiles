[tools]
ansible = "13.2.0"
awscli = { version = "2.33.5", symlink_bins = "true" }
bun = "1.3.8"
circleci = "0.1.34038"
dagger = "0.19.10"
databricks-cli = "0.285.0"
go = "1.25.6"
hugo = "0.152.2"
hyperfine = "1.20.0"
lua = "5.4.8"
node = "25.4.0"
ollama = "0.13.5"
pipx = "1.8.0"
poetry = "2.3.1"
python = "3.14.2"
rust = "1.93"
syft = "1.40.1"
terraform = "1.14.3"
trivy = "0.68.2"
usage = "2.13.1"
uv = "0.9.26"
yarn = "4.12.0"

[settings]
idiomatic_version_file_enable_tools = [
    "go",
    "node",
    "python",
    "terraform",
    "yarn",
]
lockfile = true
experimental = true

[tasks."install-euporie"]
description = "Install TUI Jupyter notebook editor and runner"
run = ["uv tool install euporie"]
